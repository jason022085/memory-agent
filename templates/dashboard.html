<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>半導體代理 - 區域記憶看板</title>
    <style>
        :root {
            --primary-color: #003366;
            --secondary-color: #f0f4f8;
            --accent-color: #00a8e8;
            --text-color: #333;
            --card-bg: #ffffff;
            --raw-log-color: #ffc107;
            --consolidated-color: #28a745;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { margin: 0; font-size: 22px; }
        .section-info {
            background: var(--card-bg);
            padding: 12px 20px;
            border-left: 5px solid var(--accent-color);
            margin-bottom: 20px;
            font-weight: bold;
            border-radius: 4px;
        }
        
        /* 摺疊卡片樣式 */
        .memory-card {
            background: var(--card-bg);
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .memory-card:hover {
            border-color: var(--accent-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .card-header {
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            background-color: #fff;
        }
        .card-header:hover { background-color: #f9f9f9; }
        
        .header-main { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        
        .card-content {
            display: none; /* 預設隱藏 */
            padding: 20px;
            background-color: #fafafa;
            border-top: 1px solid #eee;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        
        .badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            color: white;
        }
        .badge-consolidated { background-color: var(--consolidated-color); }
        .badge-raw { background-color: var(--raw-log-color); color: #000; }
        
        .arrow {
            transition: transform 0.3s ease;
            font-size: 12px;
            color: #999;
        }
        .expanded .card-content { display: block; }
        .expanded .arrow { transform: rotate(180deg); }
        
        .timestamp { color: #666; font-size: 13px; }
        .user-tag { font-weight: bold; color: var(--primary-color); }
        
        .no-data {
            text-align: center;
            padding: 50px;
            color: #999;
            background: white;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>黃光設備課：知識管理看板 (Litho Agent Dashboard)</h1>
        </header>

        <div class="section-info">
            當前檢視區域: <span style="color: var(--accent-color);">{{ section_id }}</span>
        </div>

        {% if memories %}
            {% for mem in memories %}
                <div class="memory-card" id="card-{{loop.index}}">
                    <div class="card-header" onclick="toggleCard({{loop.index}})">
                        <div class="header-main">
                            {% if mem.type == 'consolidated' %}
                                <span class="badge badge-consolidated">已固化知識</span>
                            {% else %}
                                <span class="badge badge-raw">原始日誌</span>
                            {% endif %}
                            <span class="user-tag">@{{ mem.user_id }}</span>
                            <span class="timestamp" data-ts="{{ mem.timestamp }}"></span>
                        </div>
                        <div class="arrow">▼</div>
                    </div>
                    <div class="card-content">{{ mem.content }}</div>
                </div>
            {% endfor %}
        {% else %}
            <div class="no-data">
                目前尚無記憶資料。請執行 main.py 以產生對話或睡眠整合。
            </div>
        {% endif %}
    </div>

    <script>
        // 摺疊開關
        function toggleCard(index) {
            const card = document.getElementById('card-' + index);
            card.classList.toggle('expanded');
        }

        // 時間格式化
        document.querySelectorAll('.timestamp').forEach(el => {
            const ts = parseInt(el.getAttribute('data-ts'));
            if (ts) {
                const date = new Date(ts);
                el.innerText = date.toLocaleString('zh-TW');
            }
        });
    </script>
</body>
</html>
